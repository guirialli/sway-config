[main]
font=Fira Code:size=12

[colors]
# Fundo escuro suave e texto acinzentado claro para evitar fadiga ocular
background=1e1e2e
foreground=cdd6f4

# Cursor em tom rosé/claro (contraste com o fundo)
cursor=1e1e2e f5e0dc

# Cores ANSI ajustadas para fundo escuro
regular0=45475a  # preto (cinza escuro da superfície)
regular1=f38ba8  # vermelho
regular2=a6e3a1  # verde
regular3=f9e2af  # amarelo
regular4=89b4fa  # azul
regular5=f5c2e7  # magenta (rosa)
regular6=94e2d5  # ciano
regular7=bac2de  # branco (cinza claro)

bright0=585b70   # preto claro (cinza médio)
bright1=f38ba8   # vermelho claro
bright2=a6e3a1   # verde claro
bright3=f9e2af   # amarelo claro
bright4=89b4fa   # azul claro
bright5=f5c2e7   # magenta claro
bright6=94e2d5   # ciano claro
bright7=a6adc8   # branco (texto claro vibrante)
