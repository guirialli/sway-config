[main]
font=Fira Code:size=12

[colors]
# Fundo branco suave e texto cinza escuro para evitar fadiga ocular
background=eff1f5
foreground=4c4f69

# Cursor em tom rosé/escuro
cursor=dc8a78 4c4f69

# Cores ANSI ajustadas para fundo claro
regular0=5c5f77  # preto (cinza escuro)
regular1=d20f39  # vermelho
regular2=40a02b  # verde
regular3=df8e1d  # amarelo (escurecido para leitura)
regular4=1e66f5  # azul
regular5=8839ef  # magenta
regular6=179287  # ciano
regular7=acb0be  # branco (cinza claro)

bright0=bcc0cc   # preto claro
bright1=d20f39   # vermelho claro
bright2=40a02b   # verde claro
bright3=df8e1d   # amarelo claro
bright4=1e66f5   # azul claro
bright5=8839ef   # magenta claro
bright6=179287   # ciano claro
bright7=4c4f69   # branco (texto escuro)
